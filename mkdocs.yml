site_name: AgentWatch
site_description: An open-source observatory for public reports of AI-agent incidents.
site_url: https://kohsheen1234.github.io/Open-source-AI-Incident-Observatory/
theme:
  name: material
  palette:
    scheme: slate
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy

extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Collecting data: collection.md
  - Classification & evaluation: classification.md
  - API & dashboard: api.md
  - Data model: data-model.md
  - Deployment & observability: deployment.md
  - Development: development.md
