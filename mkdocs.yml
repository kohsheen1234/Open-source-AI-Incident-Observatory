site_name: AgentWatch
site_description: An open-source observatory for public reports of AI-agent incidents.
theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - tables
  - toc:
      permalink: true
nav:
  - Overview: index.md
  - Architecture: architecture.md
  - Collecting data: collection.md
  - Data model: data-model.md
  - Development: development.md
