# Render blueprint — one-click deploy of the AgentWatch API + web app + Postgres.
# Use the "Deploy to Render" button in the README, or run `render blueprint launch`.
databases:
  - name: agentwatch-db
    plan: free

services:
  - type: web
    name: agentwatch-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    dockerCommand: /app/scripts/render-api.sh
    envVars:
      - key: AGENTWATCH_DATABASE_URL
        fromDatabase:
          name: agentwatch-db
          property: connectionString
      - key: AGENTWATCH_ENVIRONMENT
        value: production

  - type: web
    name: agentwatch-web
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: agentwatch-api
          property: hostport
