# Render blueprint — one-click deploy of the AgentWatch API + dashboard + Postgres.
# Use the "Deploy to Render" button in the README, or run `render blueprint launch`.
databases:
  - name: agentwatch-db
    plan: free

services:
  - type: web
    name: agentwatch-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    dockerCommand: /app/scripts/render-api.sh
    envVars:
      - key: AGENTWATCH_DATABASE_URL
        fromDatabase:
          name: agentwatch-db
          property: connectionString
      - key: AGENTWATCH_ENVIRONMENT
        value: production

  - type: web
    name: agentwatch-dashboard
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    dockerCommand: /app/scripts/render-dashboard.sh
    envVars:
      - key: AGENTWATCH_API_URL
        fromService:
          type: web
          name: agentwatch-api
          property: hostport
