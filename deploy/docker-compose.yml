services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: agentwatch
      POSTGRES_PASSWORD: agentwatch
      POSTGRES_DB: agentwatch
    ports:
      # Host 5433 -> container 5432 to avoid clashing with a local Postgres on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentwatch"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: ..
    command: ["/app/scripts/render-api.sh"]
    environment:
      AGENTWATCH_DATABASE_URL: postgresql+psycopg://agentwatch:agentwatch@db:5432/agentwatch
      AGENTWATCH_ARTIFACT_DIR: /data/artifacts
      PORT: "8000"
    volumes:
      - artifacts:/data/artifacts
    depends_on:
      db:
        condition: service_healthy

  dashboard:
    build: ..
    command: ["/app/scripts/render-dashboard.sh"]
    environment:
      AGENTWATCH_API_URL: http://api:8000
      PORT: "8501"
    depends_on:
      - api

  prometheus:
    image: prom/prometheus:v2.54.1
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - api

  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SECURITY_ADMIN_PASSWORD: agentwatch
      GF_AUTH_ANONYMOUS_ENABLED: "true"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus

  caddy:
    image: caddy:2
    ports:
      - "8080:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    depends_on:
      - dashboard
      - api
      - grafana

  # Optional local open-weight model server. Enable with:  docker compose --profile llm up
  ollama:
    image: ollama/ollama:latest
    profiles: ["llm"]
    volumes:
      - ollama:/root/.ollama

volumes:
  pgdata:
  artifacts:
  ollama:
