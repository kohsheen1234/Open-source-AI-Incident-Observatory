services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: agentwatch
      POSTGRES_PASSWORD: agentwatch
      POSTGRES_DB: agentwatch
    ports:
      # Host 5433 -> container 5432 to avoid clashing with a local Postgres on 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentwatch"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
